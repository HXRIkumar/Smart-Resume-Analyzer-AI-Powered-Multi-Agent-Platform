# ──────────────────────────────────────────────────────────────
# Smart Resume Analyzer — Production Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage: docker-compose -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL (no external port) ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sra-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_resume}
      POSTGRES_USER: ${POSTGRES_USER:-sra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sra_user} -d ${POSTGRES_DB:-smart_resume}" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sra-redis-prod
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ─── Backend (FastAPI — production) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sra-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sra_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smart_resume}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ─── Frontend (nginx — production) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sra-frontend-prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
