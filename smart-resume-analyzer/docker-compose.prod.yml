version: "3.8"

services:
  # ─── PostgreSQL (Production) ───
  postgres:
    image: postgres:16-alpine
    container_name: sra-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-sra_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-smart_resume_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sra_user} -d ${DB_NAME:-smart_resume_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sra-network

  # ─── Redis (Production) ───
  redis:
    image: redis:7-alpine
    container_name: sra-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sra-network

  # ─── Backend (Production) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sra-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
    volumes:
      - uploads_prod_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - sra-network

  # ─── Frontend (Production — NGINX) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sra-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - sra-network

volumes:
  postgres_prod_data:
  redis_prod_data:
  uploads_prod_data:

networks:
  sra-network:
    driver: bridge
